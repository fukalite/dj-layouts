site_name: dj-layouts
site_description: A Django layout composition library — assemble pages from independent views, rendered concurrently.
site_url: https://fukalite.github.io/dj-layouts/
repo_url: https://github.com/fukalite/dj-layouts
repo_name: fukalite/dj-layouts
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            docstring_style: google
            merge_init_into_class: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts: concepts.md
  - Reference:
    - Layouts: layouts.md
    - Panels: panels.md
    - Render Queues: render-queues.md
    - Panel Caching: caching.md
    - Partial Detection & LayoutMixin: partial-detection.md
    - Layout Context: layout-context.md
    - Decorators & Rendering: decorators.md
    - Request Attributes: request-attributes.md
    - Settings: settings.md
  - Guides:
    - Async Rendering: async.md
    - Error Handling: error-handling.md
    - Common Patterns: patterns.md
    - Security: security.md
